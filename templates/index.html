<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot NBA</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 90%;
            max-width: 450px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            background-color: #1d428a; /* Azul escuro tipo NBA */
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
        }
        
        /* Uma gambiarra de cor pra parecer logo da NBA */
        .header span {
            color: #c9082a; /* Vermelho NBA */
        }

        .chat-box {
            height: 400px;
            padding: 15px;
            overflow-y: auto;
            border-bottom: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-color: #fafafa;
        }

        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 15px;
            line-height: 1.4;
            font-size: 15px;
            word-wrap: break-word;
        }

        .user-msg {
            background-color: #d1e7dd;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
            border: 1px solid #badbcc;
            color: #0f5132;
        }

        .bot-msg {
            background-color: #e2e3e5;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border: 1px solid #d3d6d8;
            color: #41464b;
        }

        .input-area {
            display: flex;
            padding: 15px;
            background-color: #fff;
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 20px;
            outline: none;
            font-size: 15px;
        }

        .input-area input:focus {
            border-color: #1d428a;
        }

        .input-area button {
            background-color: #1d428a;
            color: white;
            border: none;
            padding: 10px 20px;
            margin-left: 10px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            transition: 0.3s;
        }

        .input-area button:hover {
            background-color: #c9082a;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="header">Chatbot <span>NBA 🏀</span></div>
        <div class="chat-box" id="chat-box">
            <div class="message bot-msg">Fala aí! Sou o Bot da NBA. Me lança uma pergunta sobre algum time (Lakers, Celtics), jogador (LeBron, Curry, Jordan) ou regras do jogo!</div>
        </div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Pergunte aqui..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()">Enviar</button>
        </div>
    </div>

    <script>
        function sendMessage() {
            var inputField = document.getElementById("user-input");
            var message = inputField.value;
            
            if(message.trim() === "") {
                return; // nao envia msg vazia
            }

            // Adiciona a msg do usuario na tela
            var chatBox = document.getElementById("chat-box");
            chatBox.innerHTML += '<div class="message user-msg">' + message + '</div>';
            
            // limpa o input
            inputField.value = "";

            // scroll pra baixo
            chatBox.scrollTop = chatBox.scrollHeight;

            // Faz requisição pro backend do flask
            var formData = new FormData();
            formData.append("msg", message);

            fetch("/chat", {
                method: "POST",
                body: formData
            })
            .then(response => response.json())
            .then(data => {
             // cria mensagem temporária
             var digitandoMsg = document.createElement("div");
             digitandoMsg.className = "message bot-msg";
             digitandoMsg.innerText = "Bot da NBA está escrevendo...";

             chatBox.appendChild(digitandoMsg);
             chatBox.scrollTop = chatBox.scrollHeight;

             // delay fake (simula digitação)
             setTimeout(() => {
             digitandoMsg.innerText = data.response;
             chatBox.scrollTop = chatBox.scrollHeight;
             }, 1000); // 1 segundo

             })
            .catch(error => {
                console.error("Erro:", error);
                chatBox.innerHTML += '<div class="message bot-msg">Ops, deu erro no servidor. Ligou o Flask lá no terminal?</div>';
            });
        }
    </script>
</body>
</html>
